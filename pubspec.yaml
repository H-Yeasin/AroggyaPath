name: arogya_path3
description: "AroggyaPath - Your Health Companion"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^3.1.0

  # Firebase (push notifications only)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.1

  # Networking
  http: ^1.2.2

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^2.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI & Media
  font_awesome_flutter: ^10.8.0
  iconsax: ^0.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  image_picker: ^1.2.1
  photo_view: ^0.15.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4
  flutter_pdfview: ^1.3.4

  # Utilities
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  file_picker: ^8.1.6
  share_plus: ^7.2.1
  json_annotation: ^4.8.1
  uuid: ^4.5.1

  # Image handling
  flutter_image_compress: ^2.4.0
  # Enhanced UX
  top_snackbar_flutter: ^3.3.0

  # Agora — Real-time chat & video/audio calls
  agora_rtc_engine: ^6.5.3
  agora_chat_sdk: ^1.2.0
  socket_io_client: ^2.0.3+1
  wakelock_plus: ^1.2.8

  # Notifications
  flutter_local_notifications: ^19.5.0
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  get: ^4.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.2
  flutter_launcher_icons: "^0.14.2"

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/logos/transLogo.png"
  min_sdk_android: 21

  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/logos/whiteArp.png
    - assets/logos/darkArp.png
    - assets/logos/logoArogya.png
    - assets/images/
    - assets/icons/
    - assets/doctor-appoinment/
    - assets/hospital_data.json

  fonts:
    - family: TiroBangla-Regular
      fonts:
        - asset: assets/TiroBangla-Regular.ttf
  uses-material-design: true
